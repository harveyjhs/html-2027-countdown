<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 Live Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e27;
        }

        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .countdown-container {
            text-align: center;
            z-index: 10;
            position: relative;
            padding: 40px;
            background: rgba(15, 20, 50, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        .time-units {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-unit {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px 35px;
            border-radius: 15px;
            min-width: 120px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s;
        }

        .time-unit:hover {
            transform: scale(1.05);
        }

        .time-value {
            font-size: 3.5rem;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .time-label {
            font-size: 1rem;
            color: #fff;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .celebration {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
        }

        .celebration h1 {
            font-size: 5rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">
        <span id="fullscreenIcon">⛶</span>
        <span id="fullscreenText">Fullscreen</span>
    </button>

    <canvas id="background-canvas"></canvas>
    <canvas id="fireworks-canvas"></canvas>
    
    <div class="countdown-container" id="countdown">
        <h1>2027 LIVE COUNTDOWN</h1>
        <div class="time-units">
            <div class="time-unit">
                <div class="time-value" id="days">000</div>
                <div class="time-label">Days</div>
            </div>
            <div class="time-unit">
                <div class="time-value" id="hours">00</div>
                <div class="time-label">Hours</div>
            </div>
            <div class="time-unit">
                <div class="time-value" id="minutes">00</div>
                <div class="time-label">Minutes</div>
            </div>
            <div class="time-unit">
                <div class="time-value" id="seconds">00</div>
                <div class="time-label">Seconds</div>
            </div>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <h1>🎉 HAPPY 2027! 🎉</h1>
    </div>

    <script>
        const targetDate = new Date('January 1, 2027 00:00:00').getTime();
        const bgCanvas = document.getElementById('background-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const fwCanvas = document.getElementById('fireworks-canvas');
        const fwCtx = fwCanvas.getContext('2d');
        
        bgCanvas.width = fwCanvas.width = window.innerWidth;
        bgCanvas.height = fwCanvas.height = window.innerHeight;

        let fireworksActive = false;
        let celebrationFireworks = [];
        let celebrationParticles = [];

        window.addEventListener('resize', () => {
            bgCanvas.width = fwCanvas.width = window.innerWidth;
            bgCanvas.height = fwCanvas.height = window.innerHeight;
        });

        // Background particles (stars, bokeh, floating particles)
        class Star {
            constructor() {
                this.reset();
                this.y = Math.random() * bgCanvas.height;
            }

            reset() {
                this.x = Math.random() * bgCanvas.width;
                this.y = -10;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.5 + 0.1;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.twinkle = Math.random() * 0.02;
            }

            update() {
                this.opacity += this.twinkle;
                if (this.opacity > 1 || this.opacity < 0.3) {
                    this.twinkle = -this.twinkle;
                }
            }

            draw() {
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                bgCtx.fill();
            }
        }

        class Bokeh {
            constructor() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.size = Math.random() * 30 + 20;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.15 + 0.05;
                this.color = `hsl(${Math.random() * 60 + 180}, 70%, 60%)`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < -50) this.x = bgCanvas.width + 50;
                if (this.x > bgCanvas.width + 50) this.x = -50;
                if (this.y < -50) this.y = bgCanvas.height + 50;
                if (this.y > bgCanvas.height + 50) this.y = -50;
            }

            draw() {
                const gradient = bgCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, this.color.replace(')', `, ${this.opacity})`).replace('hsl', 'hsla'));
                gradient.addColorStop(1, this.color.replace(')', ', 0)').replace('hsl', 'hsla'));
                
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fillStyle = gradient;
                bgCtx.fill();
            }
        }

        class FloatingParticle {
            constructor() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                if (this.y > bgCanvas.height) {
                    this.y = -10;
                    this.x = Math.random() * bgCanvas.width;
                }
            }

            draw() {
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fillStyle = `rgba(150, 200, 255, ${this.opacity})`;
                bgCtx.fill();
            }
        }

        class BackgroundFirework {
            constructor() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height * 0.7 + bgCanvas.height * 0.1;
                this.particles = [];
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.createParticles();
            }

            createParticles() {
                const count = 30;
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * (Math.random() * 2 + 1),
                        vy: Math.sin(angle) * (Math.random() * 2 + 1),
                        life: 1,
                        size: Math.random() * 2 + 1
                    });
                }
            }

            update() {
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.life -= 0.01;
                });
                this.particles = this.particles.filter(p => p.life > 0);
            }

            draw() {
                this.particles.forEach(p => {
                    bgCtx.globalAlpha = p.life * 0.4;
                    bgCtx.beginPath();
                    bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    bgCtx.fillStyle = this.color;
                    bgCtx.fill();
                });
                bgCtx.globalAlpha = 1;
            }

            isDead() {
                return this.particles.length === 0;
            }
        }

        // Celebration Fireworks (when countdown ends)
        class CelebrationFirework {
            constructor() {
                this.x = Math.random() * fwCanvas.width;
                this.y = fwCanvas.height;
                this.targetY = Math.random() * fwCanvas.height * 0.5;
                this.speed = Math.random() * 3 + 5;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.exploded = false;
            }

            update() {
                if (!this.exploded) {
                    this.y -= this.speed;
                    if (this.y <= this.targetY) {
                        this.explode();
                    }
                }
            }

            draw() {
                if (!this.exploded) {
                    fwCtx.beginPath();
                    fwCtx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    fwCtx.fillStyle = this.color;
                    fwCtx.fill();
                }
            }

            explode() {
                this.exploded = true;
                const particleCount = 60;
                for (let i = 0; i < particleCount; i++) {
                    celebrationParticles.push(new CelebrationParticle(this.x, this.y, this.color));
                }
            }
        }

        class CelebrationParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 3 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.life -= this.decay;
            }

            draw() {
                fwCtx.globalAlpha = this.life;
                fwCtx.beginPath();
                fwCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                fwCtx.fillStyle = this.color;
                fwCtx.fill();
                fwCtx.globalAlpha = 1;
            }
        }

        // Initialize background elements
        const stars = Array.from({length: 200}, () => new Star());
        const bokehElements = Array.from({length: 15}, () => new Bokeh());
        const floatingParticles = Array.from({length: 50}, () => new FloatingParticle());
        let backgroundFireworks = [];

        function animateBackground() {
            bgCtx.fillStyle = '#0a0e27';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            // Draw stars
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // Draw bokeh
            bokehElements.forEach(bokeh => {
                bokeh.update();
                bokeh.draw();
            });

            // Draw floating particles
            floatingParticles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Add occasional background fireworks
            if (Math.random() > 0.98) {
                backgroundFireworks.push(new BackgroundFirework());
            }

            // Update and draw background fireworks
            backgroundFireworks.forEach((fw, index) => {
                fw.update();
                fw.draw();
                if (fw.isDead()) {
                    backgroundFireworks.splice(index, 1);
                }
            });

            requestAnimationFrame(animateBackground);
        }

        function animateCelebration() {
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);

            celebrationFireworks.forEach((fw, index) => {
                fw.update();
                fw.draw();
                if (fw.exploded) {
                    celebrationFireworks.splice(index, 1);
                }
            });

            celebrationParticles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.life <= 0) {
                    celebrationParticles.splice(index, 1);
                }
            });

            if (fireworksActive) {
                requestAnimationFrame(animateCelebration);
            }
        }

        function startFireworks() {
            if (fireworksActive) return;
            fireworksActive = true;

            document.getElementById('countdown').style.display = 'none';
            document.getElementById('celebration').style.display = 'block';

            const interval = setInterval(() => {
                if (Math.random() > 0.6) {
                    celebrationFireworks.push(new CelebrationFirework());
                }
            }, 100);

            animateCelebration();

            setTimeout(() => {
                clearInterval(interval);
                setTimeout(() => {
                    fireworksActive = false;
                    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
                    document.getElementById('celebration').style.display = 'none';
                }, 3000);
            }, 60000);
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0 && !fireworksActive) {
                startFireworks();
            }

            if (distance >= 0) {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = String(days).padStart(3, '0');
                document.getElementById('hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            }
        }

        animateBackground();
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // Fullscreen functionality
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = document.getElementById('fullscreenIcon');
        const fullscreenText = document.getElementById('fullscreenText');

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement) {
                // Enter fullscreen
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.mozRequestFullScreen) {
                    elem.mozRequestFullScreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
            } else {
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);

        function updateFullscreenButton() {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement) {
                fullscreenIcon.textContent = '✕';
                fullscreenText.textContent = 'Exit Fullscreen';
            } else {
                fullscreenIcon.textContent = '⛶';
                fullscreenText.textContent = 'Fullscreen';
            }
        }

        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('mozfullscreenchange', updateFullscreenButton);
        document.addEventListener('MSFullscreenChange', updateFullscreenButton);
    </script>
</body>
</html>
